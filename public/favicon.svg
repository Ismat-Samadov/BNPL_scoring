<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15.5" fill="#050010" stroke="#00ff88" stroke-width="1"/>

  <!-- Duck body -->
  <ellipse cx="12" cy="19" rx="8" ry="5.5" fill="#00ff88"/>

  <!-- Duck neck -->
  <ellipse cx="18" cy="14.5" rx="4" ry="5" transform="rotate(10 18 14.5)" fill="#00ff88"/>

  <!-- Duck head -->
  <circle cx="21" cy="11" r="5.5" fill="#00ff88"/>

  <!-- Beak -->
  <polygon points="25,10.5 30,12 25,13" fill="#ff8800"/>

  <!-- Eye -->
  <circle cx="23" cy="9.5" r="2" fill="#050010"/>
  <circle cx="23.7" cy="9" r="0.8" fill="white"/>

  <!-- Wing -->
  <ellipse cx="13" cy="15" rx="6" ry="3" transform="rotate(-20 13 15)" fill="#00cc66"/>

  <!-- Tail -->
  <polygon points="4,16 -1,11 4,20" fill="#00ff88"/>

  <!-- Neon glow effect (subtle) -->
  <ellipse cx="12" cy="19" rx="8" ry="5.5" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.5"/>
  <circle cx="21" cy="11" r="5.5" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.5"/>
</svg>
